var _driveId=null, _fileId=null;

async function getToken(){
  var accounts=msalApp.getAllAccounts();
  if(!accounts.length){await msalApp.loginRedirect({scopes:SCOPES});return null;}
  try{var r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});return r.accessToken;}
  catch(e){await msalApp.acquireTokenRedirect({scopes:SCOPES,account:accounts[0]});return null;}
}
async function gGet(url){
  var t=await getToken(); if(!t)return null;
  var r=await fetch('https://graph.microsoft.com/v1.0'+url,{headers:{Authorization:'Bearer '+t}});
  if(!r.ok)throw new Error('Graph '+r.status+': '+await r.text());
  return r.json();
}
async function getDriveId(){
  if(_driveId)return _driveId;
  var site=await gGet('/sites/'+SP_HOST+':'+SITE_PATH);
  var drives=await gGet('/sites/'+site.id+'/drives');
  var drive=drives.value.find(function(d){return d.name==='Documentos'||d.name==='Documents';})||drives.value[0];
  _driveId=drive.id; return _driveId;
}
async function getFileId(){
  if(_fileId)return _fileId;
  var driveId=await getDriveId();
  var res=await gGet('/drives/'+driveId+'/root/search(q='+JSON.stringify('Kenvue')+')');
  var f=res.value.find(function(f){return f.name===FILE_NAME||f.name.toLowerCase().indexOf('trafico')!==-1||f.name.toLowerCase().indexOf('tráfico')!==-1;});
  if(!f)throw new Error('No se encontró el archivo "'+FILE_NAME+'" en SharePoint.');
  _fileId=f.id; return _fileId;
}
function parseRows(rows){
  return rows.map(function(r,i){
