var _driveId=null, _fileId=null;

async function getToken(){
  var accounts=msalApp.getAllAccounts();
  if(!accounts.length){await msalApp.loginRedirect({scopes:SCOPES});return null;}
  try{var r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});return r.accessToken;}
  catch(e){await msalApp.acquireTokenRedirect({scopes:SCOPES,account:accounts[0]});return null;}
}
async function gGet(url){
  var t=await getToken(); if(!t)return null;
  var r=await fetch('https://graph.microsoft.com/v1.0'+url,{headers:{Authorization:'Bearer '+t}});
  if(!r.ok)throw new Error('Graph '+r.status+': '+await r.text());
  return r.json();
}
async function getDriveId(){
  if(_driveId)return _driveId;
  var site=await gGet('/sites/'+SP_HOST+':'+SITE_PATH);
  var drives=await gGet('/sites/'+site.id+'/drives');
  var drive=drives.value.find(function(d){return d.name==='Documentos'||d.name==='Documents';})||drives.value[0];
  _driveId=drive.id; return _driveId;
}
async function getFileId(){
  if(_fileId)return _fileId;
  var driveId=await getDriveId();
  // Try multiple known folder paths
  var paths=[
    "/root:/Shared%20Documents/General/Herramientas:/children",
    "/root:/Shared%20Documents/Herramientas:/children",
    "/root:/General/Herramientas:/children",
    "/root:/Herramientas:/children",
    "/root:/Documentos/General/Herramientas:/children",
    "/root:/Documentos%20compartidos/General/Herramientas:/children"
  ];
  for(var i=0;i<paths.length;i++){
    try{
      var folder=await gGet("/drives/"+driveId+paths[i]);
      if(folder&&folder.value){
        var f=folder.value.find(function(f){return f.name===FILE_NAME;});
        if(f){console.log("Found in path "+paths[i]+": "+f.name);_fileId=f.id;return _fileId;}
      }
    }catch(e){console.log("Path failed: "+paths[i]);}
  }
  // Fallback: search entire drive and match EXACT filename
  console.log("Trying global search for exact filename: "+FILE_NAME);
  var res=await gGet("/drives/"+driveId+"/root/search(q='Base+Trafico')");
  if(res&&res.value){
    var f2=res.value.find(function(f){return f.name===FILE_NAME;});
    if(f2){console.log("Found via search: "+f2.name+" at "+f2.parentReference.path);_fileId=f2.id;return _fileId;}
    // Log all found files to help debug
    console.log("Files found in search: "+res.value.map(function(f){return f.name+" ("+f.parentReference.path+")";}).join(", "));
  }
  throw new Error("No se encontró '"+FILE_NAME+"' en SharePoint.");
}
function parseRows(rows){
  return rows.map(function(r,i){
    var keys=Object.keys(r);
    function find(){for(var a=0;a<arguments.length;a++){var c=arguments[a];var k=keys.find(function(k){return k.toLowerCase().indexOf(c.toLowerCase())!==-1;});if(k!==undefined)return r[k];}return '';}
    return {id:Number(find('#','id','num')||i+1),semana:String(find('semana','week')||'Sem 1'),fecha:String(find('fecha sol','fecha_sol')||''),pais:String(find('país','pais','country')||'Colombia'),categoria:String(find('categor')||'Baby'),solicitud:String(find('solicitud','entregable','descripcion')||''),tipo:String(find('tipo','type')||'Análisis'),champion:String(find('champion','responsable','owner')||''),prioridad:String(find('prioridad','priority')||'Media'),esfuerzo:Number(find('esfuerzo','hrs','horas','effort')||0),fechaLimite:String(find('fecha l','deadline','vencimiento','limite')||''),estado:String(find('estado','status','estatus')||'Pendiente'),avance:Number(String(find('avance','progreso','porcentaje')).replace('%','')||0),comentarios:String(find('comentario','nota','comment')||'')};
  }).filter(function(r){return r.solicitud&&r.solicitud.trim()!=='';});
}
async function readSP(){
  var driveId=await getDriveId(), fileId=await getFileId(), t=await getToken();
  var r=await fetch('https://graph.microsoft.com/v1.0/drives/'+driveId+'/items/'+fileId+'/content',{headers:{Authorization:'Bearer '+t}});
  if(!r.ok)throw new Error('Error descargando archivo: '+r.status);
  var buf=await r.arrayBuffer(), wb=XLSX.read(buf,{type:'array'});
  var sn=wb.SheetNames.find(function(n){return n.indexOf('Tráfico')!==-1||n.indexOf('General')!==-1||n.indexOf('trafico')!==-1;})||wb.SheetNames[0];
  return parseRows(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}));
}
async function writeSP(data){
  _driveId=null; _fileId=null;
  var driveId=await getDriveId(), fileId=await getFileId(), t=await getToken();
  if(!t) throw new Error('No se pudo obtener token');
  console.log('Guardando en SharePoint... driveId='+driveId+' fileId='+fileId);
  var wb=XLSX.utils.book_new();
  var rows=data.map(function(d){return {'#':d.id,'Semana':d.semana,'Fecha Solicitud':d.fecha,'País':d.pais,'Categoría':d.categoria,'Solicitud / Entregable':d.solicitud,'Tipo':d.tipo,'Champion Interno':d.champion,'Prioridad':d.prioridad,'Esfuerzo (hrs)':d.esfuerzo,'Fecha Límite':d.fechaLimite,'Estado':d.estado,'% Avance':d.avance,'Comentarios':d.comentarios};});
  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[4,8,14,10,18,45,12,18,10,10,12,12,10,30].map(function(w){return {wch:w};});
  XLSX.utils.book_append_sheet(wb,ws,'Tráfico General');
  var out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  var blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var up=await fetch('https://graph.microsoft.com/v1.0/drives/'+driveId+'/items/'+fileId+'/content',{method:'PUT',headers:{Authorization:'Bearer '+t,'Content-Type':'application/octet-stream'},body:blob});
  if(!up.ok)throw new Error('Error guardando en SharePoint: '+up.status+' '+await up.text());
  console.log('✅ Guardado exitosamente');
}

  function showToast(msg,type){setToast({msg:msg,type:type||'ok'});setTimeout(function(){setToast(null);},3500);}

    (async function(){

  function dashboard(){
    var eSt=ESTADOS.map(function(e){return {label:e,value:filtered.filter(function(d){return d.estado===e;}).length,color:SM[e].dot};});
    var ePa=PAISES.map(function(p){return {label:p,value:filtered.filter(function(d){return d.pais===p;}).length,color:p==='Colombia'?COL.accent:MEX.accent};});
    var eCa=CATEGORIAS.map(function(c){return {label:c,value:filtered.filter(function(d){return d.categoria===c;}).length};});
    var eCh=CHAMPIONS.map(function(c){return {label:c,value:filtered.filter(function(d){return d.champion===c;}).length};});
    function donut(data,title){
      var total=data.reduce(function(s,d){return s+d.value;},0);
      if(!total) return null;
      var cum=0, R=52, cx=70, cy=70, st=18, ci=2*Math.PI*R;
      var sl=data.map(function(d){
        var pp=d.value/total, o=ci*(1-cum-pp);
        cum+=pp;
        return {label:d.label,value:d.value,color:d.color,o:o,dash:ci*pp};
